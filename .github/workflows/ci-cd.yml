name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Job 1: Test & Build Backend
  backend-ci:
    name: Backend CI (Test & Type Check)
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install Dependencies
        run: |
          cd backend
          npm ci

      - name: Check TypeScript Compilation
        run: |
          cd backend
          npm run build

      - name: Run Integration Tests
        run: |
          cd backend
          npm run test

  # Job 2: Test & Build Frontend
  frontend-ci:
    name: Frontend CI (Next.js Compilation)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Check Next.js Build Compilation
        run: |
          cd frontend
          npm run build

  # Job 3: Docker Build & Delivery (Push to GHCR)
  docker-cd:
    name: Docker CD (Build & Push)
    needs: [ backend-ci, frontend-ci ]
    runs-on: ubuntu-latest
    # Only run on pushes to main/master (CD phase)
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push Backend Image
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/canteen-backend:latest
            ghcr.io/${{ github.repository }}/canteen-backend:${{ github.sha }}

      # Build and push Frontend Image
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/canteen-frontend:latest
            ghcr.io/${{ github.repository }}/canteen-frontend:${{ github.sha }}
