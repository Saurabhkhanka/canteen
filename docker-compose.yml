version: '3.8'

services:
  db:
    image: mongo:6.0
    container_name: canteen-db
    ports:
      - "27017:27017"
    volumes:
      - canteen_mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    container_name: canteen-backend-api
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://db:27017/canteen
      - JWT_SECRET=super_secret_key_for_development
      # Optional: SMTP email configuration
      # - SMTP_HOST=smtp.mailtrap.io
      # - SMTP_PORT=2525
      # - SMTP_USER=username
      # - SMTP_PASS=password
      # - SMTP_FROM=canteen@college.edu
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    container_name: canteen-frontend-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - BACKEND_URL=http://backend:5000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  canteen_mongodb_data:
